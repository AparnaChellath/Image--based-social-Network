<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Comment</title>
    <!-- Add Bootstrap for styling -->
    <link
        rel="stylesheet"
        href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css"
    />
    <style>
        body {
            background: linear-gradient(135deg, #f0f8ff, #e6e6fa);
            font-family: 'Arial', sans-serif;
            color: #333;
        }
        .container {
            background: #fff;
            padding: 20px 30px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            max-width: 600px;
            margin: 50px auto;
        }
        h2 {
            font-weight: bold;
            color: #555;
            text-align: center;
        }
        .btn-primary {
            background: linear-gradient(45deg, #6a5acd, #7b68ee);
            border: none;
            font-weight: bold;
            padding: 10px 20px;
            border-radius: 5px;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background: linear-gradient(45deg, #7b68ee, #6a5acd);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        }
        .text-danger {
            font-weight: bold;
        }
        ul.text-danger {
            list-style-type: square;
            padding-left: 20px;
        }
        form p {
            font-size: 1rem;
            color: #333;
        }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h2 class="mb-4">Add a Comment</h2>
        <form method="post">
            {% csrf_token %}
            <!-- Display form fields -->
            {{ form.as_p }}

            <!-- Submit button -->
            <button type="submit" class="btn btn-primary btn-block mt-3">Submit</button>
        </form>

        <!-- Handle and display form errors -->
        {% if form.errors %}
            <div class="mt-4">
                <h5 class="text-danger">Please correct the following errors:</h5>
                <ul class="text-danger">
                    {% for field in form %}
                        {% for error in field.errors %}
                            <li>{{ error }}</li>
                        {% endfor %}
                    {% endfor %}
                </ul>
            </div>
        {% endif %}
    </div>
</body>
</html>
